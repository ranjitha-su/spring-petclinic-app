stages:
  - test
  - build
  - deploy

variables:
  IMAGE_NAME: "ranjithasu/sprint-petclinic"
  IMAGE_TAG: "4.0"

gitleaks:
  stage: test
  image:
    name: zricethezav/gitleaks
    entrypoint: [""]
  script:
    # source path will be current directory as gitlab-ci loads the application code into every container for every job.
    - gitleaks detect --verbose --source . -f json -r gitleaks-report.json
  allow_failure: true
  artifacts:
    when: always
    expire_in: 15 mins
    paths:
      - gitleaks-report.json

semgrep:
  stage: test
  image: semgrep/semgrep
  variables:
    SEMGREP_RULES: p/java
  script:
    - semgrep ci --json --json-output=semgrep-report.json
  allow_failure: true
  artifacts:
    when: always
    expire_in: 15 mins
    paths:
      - semgrep-report.json

sca:
  stage: test
  image:
    name: owasp/dependency-check:latest
    entrypoint: [""]
  before_script: ls -al /usr/share/dependency-check/bin/dependency-check.sh
  script:
    - /usr/share/dependency-check/bin/dependency-check.sh -s . -f JSON -o sca-report
  allow_failure: true
  artifacts:
    when: always
    expire_in: 15 mins
    paths:
      - sca-report/dependency-check-report.json

upload_reports:
  stage: test
  image: python
  needs:
    - gitleaks
    - semgrep
    - sca
  when: always
  before_script:
    - pip3 install requests
  script:
    - python3 upload-reports.py gitleaks-report.json
    - python3 upload-reports.py semgrep-report.json
    - python3 upload-reports.py sca-report/dependency-check-report.json

build-push-image:
  stage: build
  image: docker:29.2.1
  services:
    - docker:29.2.1-dind
  variables:
    DOCKER_BUILDKIT: 1
  before_script:
    - echo $DOCKERHUB_PASS | docker login -u $DOCKERHUB_USERNAME --password-stdin
  script:
    - docker pull $IMAGE_NAME:$IMAGE_TAG || true
    - docker build --build-arg BUILDKIT_INLINE_CACHE=1 --cache-from $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:$IMAGE_TAG .
    - docker push $IMAGE_NAME:$IMAGE_TAG

